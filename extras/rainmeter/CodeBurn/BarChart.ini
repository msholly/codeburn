[Rainmeter]
Update=1000
SolidColor=15,15,20,235
OnRefreshAction=[!UpdateMeasure MeasureData][!CommandMeasure MeasureFetch "Run"]
BackgroundMode=2

[Metadata]
Name=BarChart
Author=AgentSeal
Information=Shell command frequency - live from codeburn export

[Variables]
Orange=255,100,30,255
White=205,205,200,255
Dim=90,90,100,255
BarBG=50,45,38,255
TitleBG=22,22,32,255
Line=42,42,54,255
W=340
PAD=12
FF=Segoe UI

; Gradient bar colors — top (orange) to bottom (deep blue), 10 steps
Bar1=255,107,53,255
Bar2=255,165,0,255
Bar3=255,215,0,255
Bar4=200,230,0,255
Bar5=0,200,150,255
Bar6=0,168,200,255
Bar7=0,120,200,255
Bar8=0,80,160,255
Bar9=100,80,160,255
Bar10=60,50,100,255

; =================== MEASURES ===================

[MeasureFetch]
Measure=Plugin
Plugin=RunCommand
Program=%COMSPEC%
Parameter=/c "#@#fetch.bat"
UpdateDivider=-1
FinishAction=[!UpdateMeasure MeasureData]

[MeasureData]
Measure=Plugin
Plugin=WebParser
URL=file://#@#data.txt
RegExp=(?si)BASH1_NAME=([^\n]*)\nBASH1_BAR=([^\n]*)\nBASH1_CALLS=([^\n]*)\n[^\n]*\nBASH2_NAME=([^\n]*)\nBASH2_BAR=([^\n]*)\nBASH2_CALLS=([^\n]*)\n[^\n]*\nBASH3_NAME=([^\n]*)\nBASH3_BAR=([^\n]*)\nBASH3_CALLS=([^\n]*)\n[^\n]*\nBASH4_NAME=([^\n]*)\nBASH4_BAR=([^\n]*)\nBASH4_CALLS=([^\n]*)\n[^\n]*\nBASH5_NAME=([^\n]*)\nBASH5_BAR=([^\n]*)\nBASH5_CALLS=([^\n]*)\n[^\n]*\nBASH6_NAME=([^\n]*)\nBASH6_BAR=([^\n]*)\nBASH6_CALLS=([^\n]*)\n[^\n]*\nBASH7_NAME=([^\n]*)\nBASH7_BAR=([^\n]*)\nBASH7_CALLS=([^\n]*)\n[^\n]*\nBASH8_NAME=([^\n]*)\nBASH8_BAR=([^\n]*)\nBASH8_CALLS=([^\n]*)\n[^\n]*\nBASH9_NAME=([^\n]*)\nBASH9_BAR=([^\n]*)\nBASH9_CALLS=([^\n]*)\n[^\n]*\nBASH10_NAME=([^\n]*)\nBASH10_BAR=([^\n]*)\nBASH10_CALLS=([^\n]*)
UpdateRate=1
FinishAction=[!UpdateMeter *][!Redraw]

[MeasureBash1Name]
Measure=Plugin
Plugin=WebParser
URL=[MeasureData]
StringIndex=1

